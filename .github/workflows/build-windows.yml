name: Build MIAR ARIA Windows Installer

on:
  push:
    branches: [main, master]
    paths:
      - 'desktop/**'
      - '.github/workflows/build-windows.yml'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publicar como GitHub Release?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build + publish GitHub Release (tag ou manual)
        if: "startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish == 'true'"
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build artifact only (push em branch)
        if: "!startsWith(github.ref, 'refs/tags/') && github.event.inputs.publish != 'true'"
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist folder
        run: dir dist
        continue-on-error: true

      - name: Upload artifact (builds sem release)
        if: "!startsWith(github.ref, 'refs/tags/') && github.event.inputs.publish != 'true'"
        uses: actions/upload-artifact@v4
        with:
          name: MIAR-ARIA-Setup-Windows
          path: |
            desktop/dist/*.exe
            desktop/dist/*.msi
          if-no-files-found: warn
          retention-days: 30
